<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truco Night Tracker - Estilo Argentino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #064e3b; }
        .truco-card { background: #065f46; border: 2px solid #34d399; }
        .score-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="min-h-screen p-4">

    <div class="max-w-md mx-auto" id="app">
        <header class="text-center mb-6">
            <h1 class="text-4xl font-bold text-amber-500 score-font">Noche de Truco</h1>
        </header>

        <div class="flex space-x-2 mb-6 bg-emerald-950 p-1 rounded-xl border border-emerald-800">
            <button onclick="switchTab('play')" id="tab-play" class="flex-1 py-2 font-bold rounded-lg bg-emerald-700 text-white">Partidas</button>
            <button onclick="switchTab('stats')" id="tab-stats" class="flex-1 py-2 font-bold rounded-lg text-emerald-200">Ranking</button>
        </div>

        <div id="section-play" class="space-y-4">
            <div class="bg-emerald-800 p-4 rounded-xl border border-emerald-700">
                <input type="text" id="p1" placeholder="Jugador 1" class="w-full p-2 mb-2 bg-emerald-900 text-white rounded">
                <input type="text" id="p2" placeholder="Jugador 2" class="w-full p-2 mb-2 bg-emerald-900 text-white rounded">
                <button onclick="startMatch()" class="w-full bg-amber-600 text-white py-2 rounded font-bold">Empezar Duelo</button>
            </div>
            <div id="active-matches-container" class="space-y-4"></div>
        </div>

        <div id="section-stats" class="hidden">
            <!-- Contenedor optimizado para captura -->
            <div id="capture-wrapper" class="bg-[#064e3b] p-2">
                <div id="capture-area" class="bg-emerald-900 p-6 rounded-lg border-2 border-emerald-500 text-white space-y-6">
                    <h2 class="text-2xl font-bold text-amber-400 text-center border-b border-emerald-700 pb-2">Resumen de la Noche</h2>
                    <div id="stats-list" class="space-y-3"></div>
                </div>
            </div>
            <button onclick="shareStats()" class="w-full mt-6 bg-blue-600 text-white py-3 rounded-xl font-bold">📸 Compartir Resultados</button>
        </div>
    </div>

    <script>
        let gameState = { activeMatches: [] };
        
        function save() { localStorage.setItem('truco_data', JSON.stringify(gameState)); }
        
        function switchTab(tab) {
            document.getElementById('section-play').classList.toggle('hidden', tab !== 'play');
            document.getElementById('section-stats').classList.toggle('hidden', tab !== 'stats');
            if(tab === 'stats') renderStats();
        }

        function startMatch() {
            const p1 = document.getElementById('p1').value || 'J1';
            const p2 = document.getElementById('p2').value || 'J2';
            gameState.activeMatches.push({ id: Date.now(), p1, p2, score1: 0, score2: 0 });
            save(); renderMatches();
        }

        function updateScore(id, p, delta) {
            const m = gameState.activeMatches.find(x => x.id === id);
            if(p===1) m.score1 = Math.max(0, m.score1 + delta);
            else m.score2 = Math.max(0, m.score2 + delta);
            save(); renderMatches();
        }

        function renderMatches() {
            const cont = document.getElementById('active-matches-container');
            cont.innerHTML = gameState.activeMatches.map(m => `
                <div class="truco-card p-4 rounded-lg flex justify-between items-center text-white">
                    <div class="text-center w-1/3"><div class="text-xs text-emerald-300 truncate">${m.p1}</div><div class="text-3xl font-bold text-amber-400">${m.score1}</div></div>
                    <div class="flex gap-2">
                        <button onclick="updateScore(${m.id},1,1)" class="bg-amber-600 px-3 py-1 rounded font-bold">+</button>
                        <button onclick="updateScore(${m.id},2,1)" class="bg-amber-600 px-3 py-1 rounded font-bold">+</button>
                    </div>
                    <div class="text-center w-1/3"><div class="text-xs text-emerald-300 truncate">${m.p2}</div><div class="text-3xl font-bold text-amber-400">${m.score2}</div></div>
                </div>
            `).join('');
        }

        function renderStats() {
            const list = document.getElementById('stats-list');
            list.innerHTML = gameState.activeMatches.map(m => `
                <div class="flex justify-between items-center border-b border-emerald-700 pb-2">
                    <span class="text-white font-bold text-lg">${m.p1} vs ${m.p2}</span>
                    <span class="text-amber-400 font-bold text-xl">${m.score1} - ${m.score2}</span>
                </div>
            `).join('');
        }

        function shareStats() {
            // El truco es usar un scale mayor y asegurar que los elementos no tengan overflow hidden
            html2canvas(document.getElementById("capture-area"), {
                backgroundColor: "#064e3b",
                scale: 3,
                logging: false,
                useCORS: true
            }).then(canvas => {
                canvas.toBlob(blob => {
                    const file = new File([blob], 'truco.png', { type: 'image/png' });
                    if (navigator.share) navigator.share({ files: [file] });
                    else {
                        const link = document.createElement('a');
                        link.download = 'truco.png';
                        link.href = canvas.toDataURL();
                        link.click();
                    }
                });
            });
        }
        
        const saved = localStorage.getItem('truco_data');
        if(saved) { gameState = JSON.parse(saved); renderMatches(); }
    </script>
</body>
</html>
